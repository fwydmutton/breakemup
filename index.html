<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout Touch</title>

<style>
body {
  margin: 0;
  background: #111;
  overflow: hidden;
  font-family: Arial;
}

canvas {
  display: block;
  background: #222;
}

#ui {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
}

#restartBtn {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 12px 20px;
  display: none;
}
</style>
</head>

<body>

<div id="ui"></div>
<button id="restartBtn">Restart</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const ui = document.getElementById("ui");
const restartBtn = document.getElementById("restartBtn");

let ball, paddle, bricks, score, lives, gameOver;

function init() {
  score = 0;
  lives = 3;
  gameOver = false;
  setupLevel();
  restartBtn.style.display = "none";
  draw();
}

function setupLevel(){
  ball = { x:canvas.width/2, y:canvas.height/2, dx:3, dy:-3, r:10 };
  paddle = { w:160, h:12, x:canvas.width/2 - 80 };

  bricks = [];
  for (let c=0;c<8;c++){
    bricks[c]=[];
    for (let r=0;r<5;r++){
      bricks[c][r]={ status:1, x:0, y:0, w:0, h:0 };
    }
  }

  updateUI();
}

function updateUI(){
  ui.innerText = `Score: ${score} Lives: ${lives}`;
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = "#00ffcc";
  ctx.fill();
}

function drawPaddle(){
  ctx.fillStyle = "#0095DD";
  ctx.fillRect(paddle.x, canvas.height - 30, paddle.w, paddle.h);
}

function drawBricks(){
  let bw = canvas.width / 8 - 10;
  let bh = 20;

  for (let c=0;c<8;c++){
    for (let r=0;r<5;r++){
      let b = bricks[c][r];
      if (b.status){
        let x = c*(bw+10)+5;
        let y = r*(bh+10)+40;
        b.x=x; b.y=y; b.w=bw; b.h=bh;
        ctx.fillStyle = "orange";
        ctx.fillRect(x,y,bw,bh);
      }
    }
  }
}

function collision(){
  for (let c=0;c<8;c++){
    for (let r=0;r<5;r++){
      let b = bricks[c][r];
      if (b.status){
        if (
          ball.x > b.x &&
          ball.x < b.x + b.w &&
          ball.y > b.y &&
          ball.y < b.y + b.h
        ){
          ball.dy *= -1;
          b.status = 0;
          score++;
          updateUI();
        }
      }
    }
  }
}

function draw(){
  if (gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBall();
  drawPaddle();
  drawBricks();
  collision();

  if (ball.x < ball.r || ball.x > canvas.width-ball.r) ball.dx *= -1;
  if (ball.y < ball.r) ball.dy *= -1;

  if (ball.y > canvas.height - 40){
    if (ball.x > paddle.x && ball.x < paddle.x + paddle.w){
      ball.dy *= -1;
    } else {
      loseLife();
    }
  }

  ball.x += ball.dx;
  ball.y += ball.dy;

  requestAnimationFrame(draw);
}

function loseLife(){
  lives--;
  if (lives <= 0){
    gameOver = true;
    restartBtn.style.display = "block";
  } else {
    ball.x = canvas.width/2;
    ball.y = canvas.height/2;
  }
  updateUI();
}

/* TOUCH DRAG CONTROL */

let dragging = false;

canvas.addEventListener("touchstart", e => {
  const rect = canvas.getBoundingClientRect();
  const touchX = e.touches[0].clientX - rect.left;

  if (touchX > paddle.x && touchX < paddle.x + paddle.w) {
    dragging = true;
  }
});

canvas.addEventListener("touchmove", e => {
  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();
  let touchX = e.touches[0].clientX - rect.left;

  paddle.x = touchX - paddle.w / 2;

  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x > canvas.width - paddle.w) {
    paddle.x = canvas.width - paddle.w;
  }
});

canvas.addEventListener("touchend", () => dragging = false);
canvas.addEventListener("touchcancel", () => dragging = false);

/* ALSO WORKS WITH MOUSE */

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  paddle.x = x - paddle.w / 2;

  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x > canvas.width - paddle.w) {
    paddle.x = canvas.width - paddle.w;
  }
});

restartBtn.onclick = init;

init();
</script>

</body>
</html>
