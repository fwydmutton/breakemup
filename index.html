<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#gameWrapper {
  width: 800px;
  max-width: 95vw;
}

canvas {
  width: 100%;
  aspect-ratio: 800 / 500;
  background: #222;
  border-radius: 10px;
  display: block;
}

#ui {
  color: white;
  margin: 10px;
}

/* BUTTONS CENTERED */
#controls {
  width: 800px;
  max-width: 95vw;
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 20px;
}

button {
  width: 90px;
  height: 90px;
  font-size: 30px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.25);
  color: white;
}

@media (max-width: 600px) {
  button {
    width: 110px;
    height: 110px;
    font-size: 34px;
  }
}
</style>
</head>

<body>

<div id="gameWrapper">
  <div id="ui"></div>
  <canvas id="game" width="800" height="500"></canvas>
</div>

<div id="controls">
  <button id="leftBtn">◀</button>
  <button id="rightBtn">▶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let ball, paddle, bricks, score, lives;
let left = false, right = false;

let countdown = 3;
let gameStarted = false;

/* INIT */

function init() {
  score = 0;
  lives = 3;

  ball = { x:400, y:250, dx:3, dy:-3, r:10 };
  paddle = { w:140, h:12, x:330 };

  bricks = [];
  for (let c=0;c<8;c++){
    bricks[c]=[];
    for (let r=0;r<5;r++){
      bricks[c][r]={
        status:1,
        x:0,y:0,w:0,h:0,
        color:`hsl(${r*60},70%,50%)`
      };
    }
  }

  countdown = 3;
  gameStarted = false;

  updateUI();
  startCountdown();
}

/* COUNTDOWN */

function startCountdown(){
  let interval = setInterval(()=>{
    countdown--;

    if (countdown <= 0){
      clearInterval(interval);
      gameStarted = true;
      draw();
    }
  },1000);
}

/* UI */

function updateUI(){
  ui.innerText = `Score: ${score} Lives: ${lives}`;
}

/* DRAWING */

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = "#00ffcc";
  ctx.fill();
}

function drawPaddle(){
  ctx.fillStyle = "#0095DD";
  ctx.fillRect(paddle.x, canvas.height-30, paddle.w, paddle.h);
}

function drawBricks(){
  let bw = canvas.width/8 - 10;
  let bh = 20;

  for (let c=0;c<8;c++){
    for (let r=0;r<5;r++){
      let b = bricks[c][r];
      if (b.status){
        let x = c*(bw+10)+5;
        let y = r*(bh+10)+40;

        b.x=x; b.y=y; b.w=bw; b.h=bh;

        ctx.fillStyle = b.color;
        ctx.fillRect(x,y,bw,bh);
      }
    }
  }
}

/* COLLISION */

function collision(){
  for (let c=0;c<8;c++){
    for (let r=0;r<5;r++){
      let b = bricks[c][r];
      if (b.status){
        if (
          ball.x > b.x &&
          ball.x < b.x+b.w &&
          ball.y > b.y &&
          ball.y < b.y+b.h
        ){
          ball.dy *= -1;
          b.status = 0;
          score++;
          updateUI();
        }
      }
    }
  }
}

/* GAME LOOP */

function draw(){

  if (!gameStarted){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "60px Arial";
    ctx.textAlign = "center";
    ctx.fillText(countdown > 0 ? countdown : "GO", canvas.width/2, canvas.height/2);

    requestAnimationFrame(draw);
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBall();
  drawPaddle();
  drawBricks();
  collision();

  if (ball.x<ball.r || ball.x>canvas.width-ball.r) ball.dx*=-1;
  if (ball.y<ball.r) ball.dy*=-1;

  if (ball.y>canvas.height-40){
    if (ball.x>paddle.x && ball.x<paddle.x+paddle.w){
      ball.dy*=-1;
    } else {
      lives--;
      if (lives<=0){
        alert("Game Over");
        init();
        return;
      } else {
        ball.x=400;
        ball.y=250;
      }
      updateUI();
    }
  }

  ball.x += ball.dx;
  ball.y += ball.dy;

  requestAnimationFrame(draw);
}

/* CONTROLS */

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

leftBtn.addEventListener("touchstart", e=>{e.preventDefault(); left=true;});
leftBtn.addEventListener("touchend", ()=>left=false);

rightBtn.addEventListener("touchstart", e=>{e.preventDefault(); right=true;});
rightBtn.addEventListener("touchend", ()=>right=false);

/* KEYBOARD */

document.addEventListener("keydown", e=>{
  if (e.key==="ArrowRight"||e.key==="d"||e.key==="D") right=true;
  if (e.key==="ArrowLeft"||e.key==="a"||e.key==="A") left=true;
});

document.addEventListener("keyup", e=>{
  if (e.key==="ArrowRight"||e.key==="d"||e.key==="D") right=false;
  if (e.key==="ArrowLeft"||e.key==="a"||e.key==="A") left=false;
});

/* MOVEMENT */

function movePaddle(){
  if (right) paddle.x += 6;
  if (left) paddle.x -= 6;

  if (paddle.x<0) paddle.x=0;
  if (paddle.x>canvas.width-paddle.w) paddle.x=canvas.width-paddle.w;

  requestAnimationFrame(movePaddle);
}

/* START */

init();
movePaddle();
</script>

</body>
</html>
