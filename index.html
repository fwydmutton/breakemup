<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout Game Pro+</title>

<style>
body {
  margin: 0;
  background: #111;
  overflow: hidden;
  font-family: Arial;
}

canvas {
  display: block;
  margin: 0 auto;
  background: #222;
}

#ui {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 18px;
}

#restartBtn {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 12px 20px;
  font-size: 18px;
  display: none;
  border: none;
  border-radius: 8px;
  background: #00cc88;
  color: white;
}

/* MOBILE CONTROLS */

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

#moveGroup {
  display: flex;
  gap: 20px;
}

#leftBtn, #rightBtn {
  width: 85px;
  height: 85px;
  font-size: 28px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: white;
}

#leftBtn:active, #rightBtn:active {
  background: rgba(255,255,255,0.35);
}
</style>
</head>

<body>

<div id="ui"></div>
<button id="restartBtn">Restart</button>
<canvas id="game" width="800" height="500"></canvas>

<div id="controls">
  <div id="moveGroup">
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const restartBtn = document.getElementById("restartBtn");

let ball, paddle, bricks, score, lives, level, gameOver;
let right = false, left = false;

function init() {
  level = 1;
  score = 0;
  lives = 3;
  gameOver = false;
  setupLevel();
  restartBtn.style.display = "none";
  draw();
}

function setupLevel(){
  ball = { x:400, y:250, dx:2+level*0.5, dy:-2-level*0.5, r:10 };
  paddle = { w:140, h:12, x:330 };

  const rows = 4 + level;
  const cols = 8 + Math.min(level,4);

  bricks = [];
  for (let c=0;c<cols;c++){
    bricks[c]=[];
    for (let r=0;r<rows;r++){
      bricks[c][r]={ status:1, x:0, y:0, w:0, h:0, color:`hsl(${r*50},70%,50%)` };
    }
  }

  updateUI();
}

function updateUI(){
  ui.innerText = `Level: ${level} | Score: ${score} | Lives: ${lives}`;
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = "#00ffcc";
  ctx.fill();
}

function drawPaddle(){
  ctx.shadowColor = "#00ccff";
  ctx.shadowBlur = 10;
  ctx.fillStyle = "#0095DD";
  ctx.fillRect(paddle.x, canvas.height - paddle.h - 5, paddle.w, paddle.h);
  ctx.shadowBlur = 0;
}

function drawBricks(){
  const rows = bricks[0].length;
  const cols = bricks.length;

  const pad = 10;
  const offTop = 30;
  const offLeft = 20;

  const bw = (canvas.width - offLeft*2 - pad*(cols-1))/cols;
  const bh = 20;

  for (let c=0;c<cols;c++){
    for (let r=0;r<rows;r++){
      let b = bricks[c][r];
      if (b.status===1){
        let bx = c*(bw+pad)+offLeft;
        let by = r*(bh+pad)+offTop;
        b.x=bx; b.y=by; b.w=bw; b.h=bh;
        ctx.fillStyle = b.color;
        ctx.fillRect(bx,by,bw,bh);
      }
    }
  }
}

function collision(){
  let remaining=0;
  for (let c=0;c<bricks.length;c++){
    for (let r=0;r<bricks[c].length;r++){
      let b = bricks[c][r];
      if (b.status===1){
        remaining++;
        if (
          ball.x > b.x &&
          ball.x < b.x + b.w &&
          ball.y > b.y &&
          ball.y < b.y + b.h
        ){
          ball.dy *= -1;
          b.status=0;
          score++;
          updateUI();
        }
      }
    }
  }

  if (remaining===0){
    level++;
    setupLevel();
  }
}

function draw(){
  if (gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBall();
  drawPaddle();
  drawBricks();
  collision();

  if (ball.x+ball.dx>canvas.width-ball.r || ball.x+ball.dx<ball.r) ball.dx*=-1;

  if (ball.y+ball.dy<ball.r) ball.dy*=-1;
  else if (ball.y+ball.dy>canvas.height-ball.r-10){
    if (ball.x>paddle.x && ball.x<paddle.x+paddle.w){
      ball.dy*=-1;
    } else {
      loseLife();
    }
  }

  ball.x+=ball.dx;
  ball.y+=ball.dy;

  requestAnimationFrame(draw);
}

function loseLife(){
  lives--;
  if (lives<=0){
    gameOver=true;
    ctx.fillStyle="white";
    ctx.fillText("Game Over",350,250);
    restartBtn.style.display="block";
  } else {
    ball.x=400; ball.y=250; ball.dx=2; ball.dy=-2;
    paddle.x=330;
  }
  updateUI();
}

/* SMOOTH MOVEMENT */
let velocity = 0;

function movePaddle(){
  const accel = 0.6;
  const friction = 0.85;
  const maxSpeed = 8;

  if (right) velocity += accel;
  if (left) velocity -= accel;

  velocity *= friction;
  velocity = Math.max(Math.min(velocity, maxSpeed), -maxSpeed);

  paddle.x += velocity;

  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;

  requestAnimationFrame(movePaddle);
}

/* CONTROLS */

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

function vibrate(ms){
  if (navigator.vibrate) navigator.vibrate(ms);
}

leftBtn.addEventListener("touchstart", () => {
  left = true;
  vibrate(10);
});
leftBtn.addEventListener("touchend", () => left = false);

rightBtn.addEventListener("touchstart", () => {
  right = true;
  vibrate(10);
});
rightBtn.addEventListener("touchend", () => right = false);

/* PC TESTING */

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") right=true;
  if(e.key==="ArrowLeft") left=true;
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowRight") right=false;
  if(e.key==="ArrowLeft") left=false;
});

/* PREVENT SCROLL */
document.body.addEventListener("touchmove", e=>{
  e.preventDefault();
}, { passive:false });

restartBtn.addEventListener("click",init);

init();
movePaddle();
</script>

</body>
</html>
