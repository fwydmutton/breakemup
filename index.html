<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* GAME FRAME */
#gameWrapper {
  width: 800px;
  max-width: 95vw;
}

canvas {
  width: 100%;
  height: auto;
  aspect-ratio: 800 / 500;
  display: block;
  background: #222;
  border-radius: 10px;
}

/* UI */
#ui {
  color: white;
  text-align: center;
  margin: 10px 0;
}

#restartBtn {
  margin-top: 10px;
  padding: 10px 16px;
  display: none;
}

/* FORCE CENTER UNDER GAME */
#controls {
  width: 800px;
  max-width: 95vw;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  margin: 20px auto;
}

/* BIGGER BUTTONS FOR MOBILE */
button {
  width: 90px;
  height: 90px;
  font-size: 30px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.25);
  color: white;
}

/* EVEN BIGGER ON SMALL SCREENS */
@media (max-width: 600px) {
  button {
    width: 110px;
    height: 110px;
    font-size: 34px;
  }
}
</style>
</head>

<body>

<div id="gameWrapper">
  <div id="ui"></div>
  <canvas id="game" width="800" height="500"></canvas>
</div>

<button id="restartBtn">Restart</button>

<div id="controls">
  <button id="leftBtn">◀</button>
  <button id="rightBtn">▶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ui = document.getElementById("ui");
const restartBtn = document.getElementById("restartBtn");

let ball, paddle, bricks, score, lives, gameOver;
let right = false, left = false;

function init() {
  score = 0;
  lives = 3;
  gameOver = false;
  setupLevel();
  restartBtn.style.display = "none";
  draw();
}

function setupLevel(){
  ball = { x:400, y:250, dx:3, dy:-3, r:10 };
  paddle = { w:140, h:12, x:330 };

  bricks = [];
  for (let c=0;c<8;c++){
    bricks[c]=[];
    for (let r=0;r<5;r++){
      bricks[c][r]={ status:1, x:0, y:0, w:0, h:0 };
    }
  }

  updateUI();
}

function updateUI(){
  ui.innerText = `Score: ${score} Lives: ${lives}`;
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = "#00ffcc";
  ctx.fill();
}

function drawPaddle(){
  ctx.fillStyle = "#0095DD";
  ctx.fillRect(paddle.x, canvas.height - 30, paddle.w, paddle.h);
}

function drawBricks(){
  let bw = canvas.width / 8 - 10;
  let bh = 20;

  for (let c=0;c<8;c++){
    for (let r=0;r<5;r++){
      let b = bricks[c][r];
      if (b.status){
        let x = c*(bw+10)+5;
        let y = r*(bh+10)+40;
        b.x=x; b.y=y; b.w=bw; b.h=bh;
        ctx.fillStyle = "orange";
        ctx.fillRect(x,y,bw,bh);
      }
    }
  }
}

function collision(){
  for (let c=0;c<8;c++){
    for (let r=0;r<5;r++){
      let b = bricks[c][r];
      if (b.status){
        if (
          ball.x > b.x &&
          ball.x < b.x + b.w &&
          ball.y > b.y &&
          ball.y < b.y + b.h
        ){
          ball.dy *= -1;
          b.status = 0;
          score++;
          updateUI();
        }
      }
    }
  }
}

function draw(){
  if (gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBall();
  drawPaddle();
  drawBricks();
  collision();

  if (ball.x < ball.r || ball.x > canvas.width-ball.r) ball.dx *= -1;
  if (ball.y < ball.r) ball.dy *= -1;

  if (ball.y > canvas.height - 40){
    if (ball.x > paddle.x && ball.x < paddle.x + paddle.w){
      ball.dy *= -1;
    } else {
      loseLife();
    }
  }

  ball.x += ball.dx;
  ball.y += ball.dy;

  requestAnimationFrame(draw);
}

function loseLife(){
  lives--;
  if (lives <= 0){
    gameOver = true;
    restartBtn.style.display = "block";
  } else {
    ball.x = 400;
    ball.y = 250;
  }
  updateUI();
}

/* BUTTON CONTROLS */

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

leftBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  left = true;
});
leftBtn.addEventListener("touchend", () => left = false);
leftBtn.addEventListener("touchcancel", () => left = false);

rightBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  right = true;
});
rightBtn.addEventListener("touchend", () => right = false);
rightBtn.addEventListener("touchcancel", () => right = false);

/* KEYBOARD ALSO WORKS */

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") right=true;
  if(e.key==="ArrowLeft") left=true;
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowRight") right=false;
  if(e.key==="ArrowLeft") left=false;
});

/* MOVEMENT */

function movePaddle(){
  if (right) paddle.x += 6;
  if (left) paddle.x -= 6;

  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;

  requestAnimationFrame(movePaddle);
}

restartBtn.onclick = init;

init();
movePaddle();
</script>

</body>
</html>
